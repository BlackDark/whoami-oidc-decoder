version: 2

project_name: whoami-oidc-decoder

before:
  hooks:
    - go mod tidy

builds:
  - id: whoami-oidc-decoder
    main: ./cmd/whoami-oidc-decoder
    binary: whoami-oidc-decoder
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

dockers_v2:
  - ids:
      - whoami-oidc-decoder
    images:
      - ghcr.io/blackdark/whoami-oidc-decoder
    tags:
      - "{{ .Version }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: Dockerfile
    labels:
      org.opencontainers.image.source: "https://github.com/BlackDark/whoami-oidc-decoder"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"

release:
  github:
    owner: BlackDark
    name: whoami-oidc-decoder
